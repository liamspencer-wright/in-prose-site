[build]
  command = "npm run build"
  publish = ".next"

# Only auto-deploy from main (production).
# Daily development happens on `dev`; merge to main when ready to deploy.
[build.environment]
  NODE_VERSION = "20"

[context.production]
  command = "npm run build"

# Enable deploy previews for pull requests
[context.deploy-preview]
  command = "npm run build"

# Disable automatic branch deploys (only main + PR previews)
[context.branch-deploy]
  command = "echo 'Branch deploys disabled' && exit 1"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[redirects]]
  from = "/@:username"
  to = "/u/:username"
  status = 200

[[redirects]]
  from = "/@:username/*"
  to = "/u/:username/:splat"
  status = 200

[[redirects]]
  from = "http://*"
  to = "https://inprose.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.inprose.co.uk/*"
  to = "https://inprose.co.uk/:splat"
  status = 301
  force = true
