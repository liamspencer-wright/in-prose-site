[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[redirects]]
  from = "/@:username"
  to = "/u/:username"
  status = 200

[[redirects]]
  from = "/@:username/*"
  to = "/u/:username/:splat"
  status = 200

[[redirects]]
  from = "http://*"
  to = "https://inprose.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.inprose.co.uk/*"
  to = "https://inprose.co.uk/:splat"
  status = 301
  force = true
