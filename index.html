<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>in prose – Books and data — perfectly bound.</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;700&display=swap"
            rel="stylesheet"
        />
        <script
            src="https://challenges.cloudflare.com/turnstile/v0/api.js"
            async
            defer
        ></script>
        <style>
            :root {
                --accent: #ff7f32;
                --bg-light: #f8eee1;
                --bg-medium: #f4dcc2;
                --text: #1b1b1b;
                --card-radius: 16px;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Crimson Text", serif;
                background: var(--bg-light);
                color: var(--text);
                min-height: 100svh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 2.5rem 1rem 3rem;
            }

            header {
                margin-bottom: 2rem;
            }

            header img {
                width: 200px;
                height: auto;
            }

            .orange-band {
                background: var(--accent);
                width: 100%;
                max-width: 480px;
                padding: 2.5rem 1.5rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                border-radius: var(--card-radius);
                box-shadow: 0 4px 16px rgba(255, 127, 50, 0.25);
            }

            h1 {
                text-transform: lowercase;
                font-weight: 700;
                font-size: 48px;
                color: #000;
                margin-bottom: 0.4rem;
            }

            p.tagline {
                font-weight: 400;
                font-size: 28px;
                color: #000;
            }

            /* Signup card */
            .signup-card {
                width: 100%;
                max-width: 480px;
                background: #fff;
                border-radius: var(--card-radius);
                border: 1px solid rgba(27, 27, 27, 0.08);
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
                padding: 2rem 2rem 2.25rem;
                margin-top: 1.5rem;
                text-align: center;
            }

            .signup-card p.intro {
                font-size: 1.2rem;
                color: rgba(27, 27, 27, 0.65);
                margin-bottom: 1.5rem;
            }

            .signup-card form {
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                align-items: center;
            }

            .signup-card input {
                width: 100%;
                padding: 0.75rem 1rem;
                font-family: "Crimson Text", serif;
                font-size: 1.1rem;
                border: 1.5px solid rgba(27, 27, 27, 0.15);
                border-radius: 10px;
                background: var(--bg-light);
                color: var(--text);
                outline: none;
                transition: border-color 0.15s;
            }

            .signup-card input:focus {
                border-color: var(--accent);
            }

            .signup-card input::placeholder {
                color: rgba(27, 27, 27, 0.35);
            }

            /* Turnstile widget centered */
            .cf-turnstile {
                margin: 0.25rem 0;
            }

            .signup-card button {
                width: 100%;
                padding: 0.8rem 1.5rem;
                font-family: "Crimson Text", serif;
                font-size: 1.15rem;
                font-weight: 700;
                background: var(--accent);
                color: #fff;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                transition: opacity 0.15s;
            }

            .signup-card button:hover:not(:disabled) {
                opacity: 0.88;
            }

            .signup-card button:disabled {
                opacity: 0.55;
                cursor: default;
            }

            .feedback {
                font-size: 1rem;
                padding: 0.4rem 0;
                min-height: 1.5rem;
            }

            .feedback.error {
                color: #c0392b;
            }

            .success-message {
                font-size: 1.15rem;
                color: var(--text);
                padding: 0.5rem 0;
                line-height: 1.6;
            }

            footer {
                margin-top: 2.5rem;
                font-size: 0.85rem;
                color: rgba(27, 27, 27, 0.35);
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }

            .social-icons {
                display: flex;
                gap: 1.25rem;
                align-items: center;
            }

            .social-icons a {
                display: flex;
                color: var(--text);
                opacity: 0.5;
                transition: opacity 0.15s;
            }

            .social-icons a:hover {
                opacity: 1;
            }

            .social-icons svg {
                width: 20px;
                height: 20px;
                fill: currentColor;
            }

            @media (max-width: 600px) {
                header img {
                    width: 140px;
                }
                .orange-band {
                    border-radius: 12px;
                }
                h1 {
                    font-size: 36px;
                }
                p.tagline {
                    font-size: 22px;
                }
                .signup-card {
                    padding: 1.5rem 1.25rem 1.75rem;
                }
            }
        </style>
    </head>
    <body>
        <header>
            <img src="logo.png" alt="in prose logo" />
        </header>

        <div class="orange-band">
            <h1>in prose</h1>
            <p class="tagline">Books and data — perfectly bound.</p>
        </div>

        <div class="signup-card">
            <p class="intro">Sign up for early beta access.</p>

            <form id="signup-form" novalidate>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Your name"
                    autocomplete="name"
                    required
                />
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Email address"
                    autocomplete="email"
                    required
                />
                <div
                    class="cf-turnstile"
                    data-sitekey="0x4AAAAAACtZB8AYCwk2wgLB"
                    data-theme="light"
                ></div>
                <div
                    id="form-feedback"
                    class="feedback"
                    aria-live="polite"
                ></div>
                <button type="submit">Request beta access</button>
            </form>
        </div>

        <footer>
            <div class="social-icons">
                <!-- LinkedIn -->
                <a href="https://www.linkedin.com/in/liam-spencer-wright" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                </a>
                <!-- Instagram -->
                <a href="https://www.instagram.com/inprose.app/" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                    </svg>
                </a>
                <!-- TikTok -->
                <a href="https://www.tiktok.com/@in.prose" target="_blank" rel="noopener" aria-label="TikTok">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/>
                    </svg>
                </a>
            </div>
            <p>Your details are only used to manage beta access. We won't spam you.</p>
        </footer>

        <script>
            const form = document.getElementById("signup-form");
            const feedback = document.getElementById("form-feedback");
            const btn = form.querySelector('button[type="submit"]');

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                const name = document.getElementById("name").value.trim();
                const email = document.getElementById("email").value.trim();

                if (!name || !email) {
                    showFeedback(
                        "Please fill in your name and email.",
                        "error",
                    );
                    return;
                }

                const token =
                    typeof turnstile !== "undefined"
                        ? turnstile.getResponse()
                        : null;
                if (!token) {
                    showFeedback(
                        "Please complete the verification above.",
                        "error",
                    );
                    return;
                }

                btn.disabled = true;
                btn.textContent = "Sending…";
                clearFeedback();

                try {
                    const res = await fetch("/.netlify/functions/signup", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name, email, token }),
                    });

                    const data = await res.json();

                    if (res.ok) {
                        form.innerHTML =
                            "<p class=\"success-message\">You're on the list! We'll be in touch when beta access opens.</p>";
                    } else if (res.status === 409) {
                        showFeedback(
                            "That email is already signed up!",
                            "error",
                        );
                        resetForm();
                    } else {
                        showFeedback(
                            "Something went wrong — please try again.",
                            "error",
                        );
                        resetForm();
                    }
                } catch {
                    showFeedback(
                        "Something went wrong — please try again.",
                        "error",
                    );
                    resetForm();
                }
            });

            function showFeedback(msg, type) {
                feedback.textContent = msg;
                feedback.className = "feedback " + type;
            }

            function clearFeedback() {
                feedback.textContent = "";
                feedback.className = "feedback";
            }

            function resetForm() {
                btn.disabled = false;
                btn.textContent = "Request beta access";
                if (typeof turnstile !== "undefined") turnstile.reset();
            }
        </script>
    </body>
</html>
